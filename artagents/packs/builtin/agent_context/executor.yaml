{
  "id": "builtin.agent_context",
  "name": "Agent Context",
  "kind": "built_in",
  "version": "1.0",
  "description": "Return machine-readable run, clip, artifact, and review context for an external agent.",
  "inputs": [
    {
      "name": "run_dir",
      "type": "directory",
      "description": "ArtAgents run directory containing run.json and generated artifacts."
    }
  ],
  "cache": {
    "mode": "none"
  },
  "isolation": {
    "mode": "subprocess"
  },
  "metadata": {
    "runtime_module": "artagents.agent_interface",
    "agent_runtime": "inspect_run"
  }
}
